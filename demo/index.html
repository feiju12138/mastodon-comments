<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastodon Comments Demo</title>
  <!-- 引入外部依赖 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- 引入本地构建的组件 -->
  <script src="../dist/mastodon-comments.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
<div class="container mx-auto py-10">
  <h1 class="text-3xl font-bold text-center mb-10">Mastodon Comments 演示</h1>

  <!-- 评论区挂载点 -->
  <div id="mastodon-comments"></div>
</div>

<script>
  // 初始化评论组件
  document.addEventListener("DOMContentLoaded", function() {
    initMastodonComments({
      MASTODON_DOMAIN: "mastodon.social",
      MASTODON_USER: "feiju",
      TOOT_ID: "116164221651686918"
    });
  });
</script>
</body>
</html>
