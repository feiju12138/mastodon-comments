<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Mastodon Comments</title>
  <!-- 引入 Font Awesome（你的代码里用到了图标） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<script defer src="mastodon-comments.min.js"></script></head>
<body>
<!-- 评论挂载容器（对应你的 containerId） -->
<div id="mastodon-comments"></div>

<!-- 初始化评论组件（测试用，实际项目可按需调整） -->
<script>
  window.onload = function() {
    initMastodonComments({
      MASTODON_DOMAIN: "mastodon.social",
      MASTODON_USER: "feiju",
      TOOT_ID: "116164221651686918"
    });
  };
</script>
</body>
</html>
